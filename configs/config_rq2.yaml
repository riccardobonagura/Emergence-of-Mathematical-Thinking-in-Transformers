model_name: "pythia-1.4b"
seed: 42
train_split: 0.80
n_permutation_tests: 1000  # high N for permutation-test rigour
bootstrap_n_samples: 1000  # high N for stable bootstrap CIs
bootstrap_ci: 0.95
max_iter: 1000
C: 1.0  # override from C=10.0; C-sweep showed accuracy invariant over {0.01,0.1,1.0,10.0}; C=1.0 converges faster and is more confound-conservative
solver: "lbfgs"
multiclass_strategy: "ovr"
n_jobs: -1                 # -1 = use all CPU cores

properties:
  parity:
    type: "binary"
    label_field: "parity"
    category: "CAT-PARITY"
    class_names: ["even", "odd"]
  sign:
    type: "binary"
    label_field: "sign"
    category: "CAT-SIGN"
    class_names: ["positive", "negative"]

# Canonical RQ2 output. C overridden to 1.0 (C-sweep invariance verified in results/rq2_sweep/);
# the production run writes here, where the confound checkers, RQ3, eval_gsm8k,
# and plot_rq3_trajectory all expect the weights/test_indices/dynamic to live.
output_dir: results/rq2_probing
figures_dir: "results/figures/rq2_probing"
eval_subset_size: 200
total_training_steps: 12343

# ── RQ1 geometry (run_rq1.py) ─────────────────────────────────────────────────
# iso_floor_bootstrap_n: clouds for the random-Gaussian isotropy floor (E-G-01).
# At d=2048 the floor is pinned near zero with ~6e-5 CI width, so 200 is already
# wildly oversampled vs 1000 — identical defensible result, step-1 runtime ~32→~9 min.
iso_floor_bootstrap_n: 200

# Optional overrides (documented defaults — code already reads these
# via .get(key, <canonical>); declared here for traceability)
rq3_trajectory_csv: results/rq2_probing/dynamic/trajectories_probing.csv

# ── RQ5 determinization (run_rq5.py) ──────────────────────────────────────────
# Inference-only sharpening of the "=" next-token distribution across checkpoints.
# Both keys are optional — run_rq5 reads them via config.get with these defaults:
#   rq5_batch_size : forward-pass batch over math stimuli (defaults to the model
#                    profile's extract_batch_size when omitted)
#   rq5_output_dir : where determinization.csv + per-step JSON are written
rq5_batch_size: 32
rq5_output_dir: results/rq5_determinization