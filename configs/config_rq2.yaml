model_name: "pythia-1.4b"
seed: 42
train_split: 0.80
n_permutation_tests: 1000  # high N for permutation-test rigour
bootstrap_n_samples: 1000  # high N for stable bootstrap CIs
bootstrap_ci: 0.95
max_iter: 1000
C: 1.0  # override from C=10.0; C-sweep showed accuracy invariant over {0.01,0.1,1.0,10.0}; C=1.0 converges faster and is more confound-conservative
solver: "lbfgs"
multiclass_strategy: "ovr"
n_jobs: -1                 # -1 = use all CPU cores

properties:
  parity:
    type: "binary"
    label_field: "parity"
    category: "CAT-PARITY"
    class_names: ["even", "odd"]
  sign:
    type: "binary"
    label_field: "sign"
    category: "CAT-SIGN"
    class_names: ["positive", "negative"]

# Canonical RQ2 output. C overridden to 1.0 (C-sweep invariance verified in results/rq2_sweep/);
# the production run writes here, where the confound checkers, RQ3, eval_gsm8k,
# and plot_rq3_trajectory all expect the weights/test_indices/dynamic to live.
output_dir: results/rq2_probing
figures_dir: "results/figures/rq2_probing"
eval_subset_size: 200
total_training_steps: 12343