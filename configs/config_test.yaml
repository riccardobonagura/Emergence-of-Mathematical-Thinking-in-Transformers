model_name: "fixture-model"
seed: 42
train_split: 0.80
n_permutation_tests: 10
bootstrap_n_samples: 100
bootstrap_ci: 0.95
max_iter: 100
C: 1.0
solver: "lbfgs"
multiclass_strategy: "ovr"
n_jobs: 2

properties:
  parity:
    type: "binary"
    label_field: "parity"
    class_names: ["even", "odd"]
  sign:
    type: "binary"
    label_field: "sign"
    class_names: ["positive", "negative"]

output_dir: "results/probing_test"
figures_dir: "results/figures_test"
eval_subset_size: 20